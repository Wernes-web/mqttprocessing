apiVersion: apps/v1
kind: Deployment

metadata:
  name: mqttprocessing
  namespace: iot

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mqttprocessing

  template:
    metadata:
      labels:
        app: mqttprocessing

    spec:
      nodeSelector:
        role: control

      containers:
      - name: mqttprocessing

        image: wernes1/mqttprocessing:d7d5e58ca4ec587becd75dba62908f5008201628

        imagePullPolicy: Always

        env:
        - name: MQTT_HOST
          value: mosquitto-service

        - name: MQTT_PORT
          value: "1883"

        - name: DB_HOST
          value: postgres